<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Pizza</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-5">

  <div class="content-card mx-auto" style="max-width: 600px;">

    <h2 class="text-center mb-4">Edit Pizza</h2>

    <form th:action="@{/pizzas/edit}"
          th:object="${pizzaEditDTO}"
          method="post">

      <input type="hidden" th:field="*{id}">

      <div class="mb-3">
        <label class="form-label">Pizza Name</label>

        <input type="text"
               th:field="*{name}"
               class="form-control">

        <small class="text-danger"
               th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}">
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Price</label>

        <input type="number"
               step="0.01"
               th:field="*{price}"
               class="form-control">

        <small class="text-danger"
               th:if="${#fields.hasErrors('price')}"
               th:errors="*{price}">
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>

        <textarea th:field="*{description}"
                  class="form-control"
                  rows="4"></textarea>

        <small class="text-danger"
               th:if="${#fields.hasErrors('description')}"
               th:errors="*{description}">
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Image URL</label>

        <input type="text"
               th:field="*{imageUrl}"
               class="form-control">
      </div>

      <button class="btn btn-warning w-100"
              type="submit">
        Save Changes
      </button>

      <a th:href="@{/pizzas}"
         class="btn btn-secondary w-100 mt-2">
        Back
      </a>

    </form>

  </div>

</div>

</body>
</html>
