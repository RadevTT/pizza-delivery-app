<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="#">🍕 Pizza Delivery</a>

  <div class="ms-auto d-flex align-items-center">

        <span class="text-white me-3">
            Welcome,
            <b th:text="${#authentication.name}">User</b>
        </span>

    <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">
      Logout
    </a>
  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

  <h2 class="mb-4">Dashboard</h2>

  <!-- CARDS -->
  <div class="row">

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h5>🍕 Pizzas</h5>
          <p>View and order pizzas</p>
          <a href="#" class="btn btn-primary">Go</a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h5>🛒 Orders</h5>
          <p>Check your orders</p>
          <a href="#" class="btn btn-success">Go</a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h5>👤 Profile</h5>
          <p>Manage your account</p>
          <a href="#" class="btn btn-warning">Go</a>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
