<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>All Pizzas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" th:href="@{/home}">
            🍕 Pizza Delivery
        </a>

        <div>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/pizzas/add}"
               class="btn btn-success me-2">
                Add Pizza
            </a>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    Logout
                </button>
            </form>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4 page-title">
        Our Pizzas
    </h1>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="pizza : ${pizzas}">

            <div class="card h-100 shadow">

                <img th:src="${pizza.imageUrl}"
                     class="card-img-top"
                     style="height:250px; object-fit:cover;"
                     alt="Pizza Image">

                <div class="card-body">

                    <h4 class="card-title"
                        th:text="${pizza.name}">
                        Pizza Name
                    </h4>

                    <p class="card-text"
                       th:text="${pizza.description}">
                        Pizza description
                    </p>

                    <h5 class="text-success">
                        €<span th:text="${pizza.price}">0.00</span>
                    </h5>

                </div>

                <div class="card-footer bg-white">

                    <a th:href="@{'/orders/create/' + ${pizza.id}}"
                       class="btn btn-primary w-100 mb-2">
                        Order
                    </a>

                    <a sec:authorize="hasRole('ADMIN')"
                       th:href="@{'/pizzas/edit/' + ${pizza.id}}"
                       class="btn btn-warning w-100 mb-2">
                        Edit
                    </a>

                    <form sec:authorize="hasRole('ADMIN')"
                          th:action="@{'/pizzas/delete/' + ${pizza.id}}"
                          method="post">

                        <button type="submit"
                                class="btn btn-danger w-100">
                            Delete
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
