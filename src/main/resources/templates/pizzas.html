<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Pizzas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/home">
            Pizza Delivery
        </a>

        <div>
            <a href="/pizzas/add"
               class="btn btn-success me-2">
                Add Pizza
            </a>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    Logout
                </button>
            </form>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Our Pizzas
    </h1>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="pizza : ${pizzas}">

            <div class="card h-100 shadow">

                <img th:src="${pizza.imageUrl}"
                     class="card-img-top"
                     style="height:250px; object-fit:cover;"
                     alt="Pizza Image">

                <div class="card-body">

                    <h4 class="card-title"
                        th:text="${pizza.name}">
                    </h4>

                    <p class="card-text"
                       th:text="${pizza.description}">
                    </p>

                    <h5 class="text-success">
                        € <span th:text="${pizza.price}"></span>
                    </h5>

                </div>

                <div class="card-footer bg-white">

                    <a th:href="@{'/orders/create/' + ${pizza.id}}"
                       class="btn btn-primary w-100 mb-2">
                        Order
                    </a>

                    <a th:href="@{'/pizzas/edit/' + ${pizza.id}}"
                       class="btn btn-warning w-100 mb-2">
                        Edit
                    </a>

                    <a th:href="@{'/pizzas/delete/' + ${pizza.id}}"
                       class="btn btn-danger w-100">
                        Delete
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
