<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">Pizza Delivery</a>

    <div>
      <a class="btn btn-outline-light me-2" th:href="@{/pizzas}">Pizzas</a>
      <a class="btn btn-danger" th:href="@{/logout}">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <h1 class="mb-4">My Orders</h1>

  <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
    You have no orders yet.
  </div>

  <table th:if="${!#lists.isEmpty(orders)}"
         class="table table-bordered table-striped shadow-sm bg-white">

    <thead class="table-dark">
    <tr>
      <th>Order ID</th>
      <th>Status</th>
      <th>Created On</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="order : ${orders}">
      <td th:text="${order.id}">id</td>
      <td th:text="${order.status}">status</td>
      <td th:text="${#temporals.format(order.createdOn, 'dd.MM.yyyy HH:mm')}">created</td>
    </tr>
    </tbody>

  </table>

</div>

</body>
</html>
