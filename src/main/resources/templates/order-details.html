<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Order Details</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" th:href="@{/home}">
      🍕 Pizza Delivery
    </a>

    <div>
      <a class="btn btn-outline-light me-2"
         th:href="@{/orders}">
        My Orders
      </a>

      <a class="btn btn-outline-light"
         th:href="@{/home}">
        Dashboard
      </a>
    </div>

  </div>
</nav>

<div class="container mt-5">

  <h2 class="mb-4 page-title">Order Details</h2>

  <table class="table table-bordered table-striped bg-white shadow">

    <thead class="table-dark">
    <tr>
      <th>Pizza</th>
      <th>Quantity</th>
      <th>Price</th>
      <th>Total</th>
      <th>Status</th>
      <th>Created</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="detail : ${details}">

      <td th:text="${detail.pizzaName}">Pizza</td>

      <td th:text="${detail.quantity}">1</td>

      <td th:text="${'€' + detail.price}">€15.00</td>

      <td th:text="${'€' + detail.total}">€30.00</td>

      <td th:text="${detail.status}">PENDING</td>

      <td th:text="${#temporals.format(detail.createdOn, 'dd.MM.yyyy HH:mm')}">
        11.06.2026 22:00
      </td>

    </tr>

    </tbody>

  </table>

  <button type="button"
          class="btn btn-secondary"
          onclick="history.back()">
    Back
  </button>

</div>

</body>
</html>
