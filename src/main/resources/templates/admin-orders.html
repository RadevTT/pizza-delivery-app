<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">🍕 Pizza Delivery Admin</a>

    <div>
      <a class="btn btn-outline-light me-2" th:href="@{/pizzas}">Pizzas</a>
      <a class="btn btn-danger" th:href="@{/logout}">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <h1 class="mb-4 page-title">All Orders</h1>

  <table class="table table-bordered table-striped bg-white shadow-sm">

    <thead class="table-dark">
    <tr>
      <th>Order ID</th>
      <th>User</th>
      <th>Status</th>
      <th>Created On</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="order : ${orders}">

      <td th:text="${order.id}">id</td>

      <td th:text="${order.user.username}">username</td>

      <td th:text="${order.status}">status</td>

      <td th:text="${#temporals.format(order.createdOn, 'dd.MM.yyyy HH:mm')}">
        created
      </td>

      <td>
        <form th:action="@{'/admin/orders/change-status/' + ${order.id}}"
              method="post">

          <button class="btn btn-warning btn-sm"
                  type="submit">
            Next Status
          </button>

        </form>
      </td>

    </tr>
    </tbody>

  </table>

</div>

</body>
</html>
