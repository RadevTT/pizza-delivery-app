<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" th:href="@{/home}">
      🍕 Pizza Delivery Admin
    </a>

    <div>
      <a class="btn btn-outline-light me-2"
         th:href="@{/pizzas}">
        Pizzas
      </a>

      <form th:action="@{/logout}"
            method="post"
            style="display:inline;">

        <button type="submit"
                class="btn btn-danger">
          Logout
        </button>

      </form>
    </div>

  </div>
</nav>

<div class="container mt-5">

  <h1 class="mb-4 page-title">
    All Orders
  </h1>

  <div th:if="${successMessage}"
       class="alert alert-success"
       th:text="${successMessage}">
  </div>

  <table class="table table-bordered table-striped bg-white shadow-sm">

    <thead class="table-dark">
    <tr>
      <th>Order ID</th>
      <th>User</th>
      <th>Status</th>
      <th>Created On</th>
      <th>Details</th>
      <th>Actions</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="order : ${orders}">

      <td th:text="${order.id}">
        id
      </td>

      <td th:text="${order.user.username}">
        username
      </td>

      <td>
                <span th:if="${order.status.name() == 'PENDING'}"
                      class="badge text-bg-warning">
                    PENDING
                </span>

        <span th:if="${order.status.name() == 'PREPARING'}"
              class="badge text-bg-primary">
                    PREPARING
                </span>

        <span th:if="${order.status.name() == 'OUT_FOR_DELIVERY'}"
              class="badge text-bg-info">
                    OUT FOR DELIVERY
                </span>

        <span th:if="${order.status.name() == 'DELIVERED'}"
              class="badge text-bg-success">
                    DELIVERED
                </span>

        <span th:if="${order.status.name() == 'CANCELLED'}"
              class="badge text-bg-danger">
                    CANCELLED
                </span>
      </td>

      <td th:text="${#temporals.format(order.createdOn, 'dd.MM.yyyy HH:mm')}">
        created
      </td>

      <td>
        <a th:href="@{'/orders/' + ${order.id}}"
           class="btn btn-primary btn-sm">
          Details
        </a>
      </td>

      <td>
        <div class="d-flex gap-2">

          <form th:if="${order.status.name() != 'DELIVERED'
                                  and order.status.name() != 'CANCELLED'}"
                th:action="@{'/admin/orders/change-status/' + ${order.id}}"
                method="post">

            <button class="btn btn-warning btn-sm"
                    type="submit">
              Next Status
            </button>

          </form>

          <form th:if="${order.status.name() == 'PENDING'
                                  or order.status.name() == 'PREPARING'}"
                th:action="@{'/admin/orders/cancel/' + ${order.id}}"
                method="post">

            <button class="btn btn-danger btn-sm"
                    type="submit">
              Cancel
            </button>

          </form>

          <span th:if="${order.status.name() == 'DELIVERED'
                                  or order.status.name() == 'CANCELLED'}"
                class="text-muted fw-bold">
                        Final status
                    </span>

        </div>
      </td>

    </tr>

    </tbody>

  </table>

</div>

</body>
</html>
