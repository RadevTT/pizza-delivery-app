<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">🍕 Pizza Delivery</a>

    <div>
      <a class="btn btn-outline-light me-2" th:href="@{/pizzas}">Pizzas</a>
      <a class="btn btn-outline-light me-2" th:href="@{/orders}">Orders</a>

      <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-outline-light btn-sm">
          Logout
        </button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <div class="content-card mx-auto" style="max-width: 600px;">

    <h2 class="text-center mb-4">My Profile</h2>

    <p class="profile-info">
      <strong>Username:</strong>
      <span th:text="${user.username}">username</span>
    </p>

    <p class="profile-info">
      <strong>Email:</strong>
      <span th:text="${user.email}">email</span>
    </p>

    <p class="profile-info">
      <strong>Roles:</strong>
      <span th:each="role : ${user.roles}"
            th:text="${role.name + ' '}">
            </span>
    </p>

    <a th:href="@{/home}" class="btn btn-secondary w-100">
      Back to Dashboard
    </a>

  </div>

</div>

</body>
</html>
