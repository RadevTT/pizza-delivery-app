<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">🍕 Pizza Delivery</a>

    <div>
      <a class="btn btn-outline-light me-2" th:href="@{/pizzas}">Pizzas</a>
      <a class="btn btn-outline-light me-2" th:href="@{/orders}">Orders</a>
      <a class="btn btn-danger" th:href="@{/logout}">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <div class="card shadow mx-auto" style="max-width: 600px;">
    <div class="card-body">

      <h2 class="text-center mb-4">My Profile</h2>

      <p>
        <strong>Username:</strong>
        <span th:text="${user.username}">username</span>
      </p>

      <p>
        <strong>Email:</strong>
        <span th:text="${user.email}">email</span>
      </p>

      <p>
        <strong>Roles:</strong>
        <span th:each="role : ${user.roles}"
              th:text="${role.name + ' '}">
                </span>
      </p>

      <a th:href="@{/home}" class="btn btn-secondary w-100">
        Back to Dashboard
      </a>

    </div>
  </div>

</div>

</body>
</html>
