<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet"
        th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand"
       th:href="@{/home}">
      🍕 Pizza Delivery
    </a>

    <div>

      <a class="btn btn-outline-light me-2"
         th:href="@{/pizzas}">
        Pizzas
      </a>

      <a class="btn btn-outline-light me-2"
         th:href="@{/orders}">
        Orders
      </a>

      <form th:action="@{/logout}"
            method="post"
            style="display:inline;">

        <button type="submit"
                class="btn btn-outline-light btn-sm">
          Logout
        </button>

      </form>

    </div>

  </div>
</nav>

<div class="container mt-5">

  <div class="content-card mx-auto"
       style="max-width: 600px;">

    <h2 class="text-center mb-4">
      My Profile
    </h2>

    <form th:action="@{/profile}"
          th:object="${profileEditDTO}"
          method="post">

      <div class="mb-3">

        <label class="form-label">
          Username
        </label>

        <input type="text"
               class="form-control"
               th:value="${user.username}"
               readonly>

      </div>

      <div class="mb-3">

        <label class="form-label">
          Email
        </label>

        <input type="email"
               class="form-control"
               th:field="*{email}"
               autocomplete="email">

        <small class="text-danger"
               th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}">
        </small>

      </div>

      <div class="mb-3">

        <label class="form-label">
          New Password
        </label>

        <input type="password"
               class="form-control"
               th:field="*{password}"
               autocomplete="new-password">

        <small class="text-muted d-block">
          Leave empty if you do not want to change it.
        </small>

        <small class="text-danger"
               th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}">
        </small>

      </div>

      <div class="mb-4">

        <label class="form-label">
          Confirm Password
        </label>

        <input type="password"
               class="form-control"
               th:field="*{confirmPassword}"
               autocomplete="new-password">

      </div>

      <div th:if="${profileError}"
           class="alert alert-danger"
           th:text="${profileError}">
      </div>

      <button type="submit"
              class="btn btn-success w-100">
        Save Changes
      </button>

    </form>

    <a th:href="@{/home}"
       class="btn btn-secondary w-100 mt-3">
      Back to Dashboard
    </a>

  </div>

</div>

</body>
</html>
