<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Create Order</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">Pizza Delivery</a>
    <a class="btn btn-outline-light" th:href="@{/pizzas}">Back to Pizzas</a>
  </div>
</nav>

<div class="container mt-5">

  <div class="card shadow mx-auto" style="max-width: 600px;">
    <div class="card-body">

      <h2 class="text-center mb-4">Create Order</h2>

      <h4 th:text="${pizza.name}">Pizza Name</h4>

      <p th:text="${pizza.description}">Description</p>

      <h5 class="text-success">
        Price: <span th:text="${pizza.price}"></span> лв.
      </h5>

      <form th:action="@{/orders/create}"
            th:object="${orderCreateDTO}"
            method="post">

        <input type="hidden" th:field="*{pizzaId}">

        <div class="mb-3 mt-4">
          <label class="form-label">Quantity</label>

          <input type="number"
                 th:field="*{quantity}"
                 class="form-control"
                 min="1">

          <small class="text-danger"
                 th:if="${#fields.hasErrors('quantity')}"
                 th:errors="*{quantity}">
          </small>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Confirm Order
        </button>

      </form>

    </div>
  </div>

</div>

</body>
</html>
